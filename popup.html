<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accidental Secret Sentinel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
            width: 380px;
            min-height: 200px;
            max-height: 600px;
            overflow-y: auto;
            background: #fff;
            color: #1a1a1a;
        }

        /* ── Header ─────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo {
            width: 20px;
            height: 20px;
            background: #E24B4A;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
        }

        .title {
            font-weight: 600;
            font-size: 13px;
        }

        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toggle-label {
            font-size: 11px;
            color: #666;
        }

        /* Toggle switch */
        .toggle {
            position: relative;
            width: 28px;
            height: 16px;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            inset: 0;
            background: #ccc;
            border-radius: 8px;
            cursor: pointer;
            transition: background .2s;
        }

        .slider::before {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            left: 2px;
            top: 2px;
            background: #fff;
            border-radius: 50%;
            transition: transform .2s;
        }

        input:checked+.slider {
            background: #185FA5;
        }

        input:checked+.slider::before {
            transform: translateX(12px);
        }

        /* ── Findings count bar ──────────────────────────── */
        .count-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: #f8f8f8;
            border-bottom: 1px solid #eee;
        }

        .count-text {
            font-size: 12px;
            color: #555;
        }

        .count-badge {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .badge-red {
            background: #FCEBEB;
            color: #791F1F;
        }

        .badge-gray {
            background: #eee;
            color: #666;
        }

        .btn-clear {
            font-size: 11px;
            color: #185FA5;
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 4px;
        }

        .btn-clear:hover {
            text-decoration: underline;
        }

        /* ── Empty state ─────────────────────────────────── */
        .empty {
            padding: 32px 16px;
            text-align: center;
            color: #888;
        }

        .empty-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .empty-title {
            font-weight: 600;
            font-size: 13px;
            color: #333;
            margin-bottom: 4px;
        }

        .empty-sub {
            font-size: 12px;
            line-height: 1.5;
        }

        /* ── Finding card ────────────────────────────────── */
        .finding {
            padding: 10px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .finding:hover {
            background: #fafafa;
        }

        .finding.expanded {
            background: #fafafa;
        }

        .finding-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .finding-name {
            font-weight: 600;
            font-size: 12px;
            flex: 1;
        }

        .severity {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .severity-critical {
            background: #FCEBEB;
            color: #791F1F;
        }

        .severity-warning {
            background: #FAEEDA;
            color: #633806;
        }

        .severity-info {
            background: #E6F1FB;
            color: #0C447C;
        }

        .finding-value {
            font-family: monospace;
            font-size: 11px;
            color: #555;
            margin-top: 3px;
        }

        .finding-meta {
            font-size: 11px;
            color: #888;
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Expanded detail */
        .finding-detail {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #eee;
            display: none;
        }

        .finding.expanded .finding-detail {
            display: block;
        }

        .detail-row {
            display: flex;
            gap: 6px;
            font-size: 11px;
            color: #555;
            margin-bottom: 4px;
            align-items: baseline;
        }

        .detail-label {
            color: #888;
            flex-shrink: 0;
            width: 70px;
        }

        .suppress-row {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .btn-suppress {
            font-size: 11px;
            padding: 3px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            color: #333;
        }

        .btn-suppress:hover {
            background: #f5f5f5;
        }

        /* ── Footer ─────────────────────────────────────── */
        .footer {
            padding: 10px 16px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-link {
            font-size: 11px;
            color: #185FA5;
            background: none;
            border: none;
            cursor: pointer;
            text-decoration: none;
        }

        .footer-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="header-left">
            <div class="logo">S</div>
            <span class="title">Secret Sentinel</span>
        </div>
        <div class="toggle-wrap">
            <span class="toggle-label" id="toggle-label">On</span>
            <label class="toggle">
                <input type="checkbox" id="enabled-toggle" title="Toggle scanning" aria-labelledby="toggle-label" checked />
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="count-bar">
        <span class="count-text" id="count-text">Scanning...</span>
        <button class="btn-clear" id="btn-clear" style="display:none">Clear all</button>
    </div>

    <div id="findings-list"></div>

    <div class="footer">
        <button class="footer-link" id="btn-settings">Settings & suppressions</button>
        <button class="footer-link" id="btn-export">Export JSON</button>
    </div>

    <script type="module" src="dist/popup.js"></script>
</body>

</html>
