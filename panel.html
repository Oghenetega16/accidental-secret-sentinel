<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sentinel Panel</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 12px;
            color: #333;
            background: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            border-bottom: 1px solid #ccc;
            background: #f3f3f3;
        }

        button {
            font-size: 12px;
            padding: 4px 12px;
            cursor: pointer;
            border: 1px solid #888;
            border-radius: 3px;
            background: #fff;
        }

        button:disabled {
            color: #aaa;
            border-color: #ddd;
            cursor: not-allowed;
        }

        .table-container {
            flex: 1;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            position: sticky;
            top: 0;
            background: #f1f1f1;
            font-weight: 600;
            padding: 6px 12px;
            border-bottom: 1px solid #ccc;
        }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }

        tr:hover {
            background: #f9f9f9;
        }

        .font-mono {
            font-family: monospace;
        }

        .text-red {
            color: #d32f2f;
        }

        .font-bold {
            font-weight: 600;
        }

        .truncate {
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .badge {
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
        }

        .badge-critical {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-info {
            background: #e0f2fe;
            color: #075985;
        }

        .source-tag {
            background: #f1f5f9;
            color: #475569;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        #empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #666;
        }
    </style>
</head>

<body>

    <div class="toolbar">
        <span><strong>Secret Sentinel</strong> Network & DOM Monitor</span>
        <button id="btn-clear" disabled>Clear Session Log</button>
    </div>

    <div id="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
            <path d="M9 12l2 2 4-4"></path>
        </svg>
        <p style="margin-top: 12px;">Listening for exposed secrets on this tab...</p>
    </div>

    <div class="table-container">
        <table style="display: none;">
            <thead>
                <tr>
                    <th style="width: 80px;">Severity</th>
                    <th style="width: 150px;">Pattern</th>
                    <th>Value</th>
                    <th style="width: 120px;">Source</th>
                    <th>URL Path</th>
                </tr>
            </thead>
            <tbody id="findings-body"></tbody>
        </table>
    </div>
    
    <script type="module" src="/src/devtools/panel.ts"></script>
</body>

</html>
