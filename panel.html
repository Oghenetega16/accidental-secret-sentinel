<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secret Sentinel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --c-bg: #1e1e1e;
            --c-bg-row: #252525;
            --c-bg-hover: #2d2d2d;
            --c-bg-selected: #1e3a5f;
            --c-border: #3a3a3a;
            --c-text: #d4d4d4;
            --c-text-dim: #888;
            --c-text-bright: #f0f0f0;
            --c-critical: #f97171;
            --c-warning: #e8a94c;
            --c-info: #5b9bd5;
            --c-brand: #4e9fe5;
            --c-green: #6dbf67;
            --c-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
        }

        /* Light theme support (DevTools follows system/DevTools theme) */
        @media (prefers-color-scheme: light) {
            :root {
                --c-bg: #ffffff;
                --c-bg-row: #fafafa;
                --c-bg-hover: #f3f3f3;
                --c-bg-selected: #e8f0fe;
                --c-border: #e0e0e0;
                --c-text: #333;
                --c-text-dim: #888;
                --c-text-bright: #111;
                --c-critical: #c0392b;
                --c-warning: #b7721a;
                --c-info: #1a6fab;
                --c-brand: #1a6fab;
                --c-green: #2e7d32;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 12px;
            background: var(--c-bg);
            color: var(--c-text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Toolbar ────────────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-bottom: 1px solid var(--c-border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .toolbar-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--c-text-bright);
            margin-right: 4px;
        }

        .btn {
            font-size: 11px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 4px;
            border: 1px solid var(--c-border);
            background: transparent;
            color: var(--c-text);
            cursor: pointer;
            transition: background .12s;
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--c-bg-hover);
        }

        .btn:active {
            opacity: .8;
        }

        .btn-primary {
            background: var(--c-brand);
            color: #fff;
            border-color: var(--c-brand);
        }

        .btn-primary:hover {
            opacity: .85;
            background: var(--c-brand);
        }

        /* Filter chips */
        .filter-group {
            display: flex;
            gap: 4px;
            margin-left: 8px;
        }

        .chip {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 3px;
            border: 1px solid var(--c-border);
            background: transparent;
            cursor: pointer;
            letter-spacing: .03em;
            text-transform: uppercase;
            transition: background .1s;
        }

        .chip:hover {
            background: var(--c-bg-hover);
        }

        .chip.active-critical {
            background: rgba(201, 48, 44, .18);
            color: var(--c-critical);
            border-color: var(--c-critical);
        }

        .chip.active-warning {
            background: rgba(232, 169, 76, .18);
            color: var(--c-warning);
            border-color: var(--c-warning);
        }

        .chip.active-info {
            background: rgba(91, 155, 213, .18);
            color: var(--c-info);
            border-color: var(--c-info);
        }

        .chip.active-all {
            background: var(--c-brand);
            color: #fff;
            border-color: var(--c-brand);
        }

        /* Search */
        .search-wrap {
            margin-left: auto;
        }

        .search-input {
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 4px;
            border: 1px solid var(--c-border);
            background: var(--c-bg-row);
            color: var(--c-text);
            width: 180px;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--c-brand);
        }

        /* Count pill */
        .count-pill {
            font-size: 10px;
            font-weight: 600;
            padding: 1px 6px;
            border-radius: 8px;
            background: var(--c-bg-hover);
            color: var(--c-text-dim);
            margin-left: 4px;
        }

        /* ── Split pane layout ──────────────────────────── */
        .split {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Findings table (left pane) ─────────────────── */
        .table-pane {
            flex: 1;
            overflow-y: auto;
            border-right: 1px solid var(--c-border);
            min-width: 0;
        }

        .table-header {
            display: grid;
            grid-template-columns: 24px 120px 80px 90px 1fr 80px;
            gap: 0;
            padding: 4px 8px;
            border-bottom: 1px solid var(--c-border);
            background: var(--c-bg);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .th {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--c-text-dim);
            padding: 2px 4px;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .th:hover {
            color: var(--c-text);
        }

        .table-body {}

        .row {
            display: grid;
            grid-template-columns: 24px 120px 80px 90px 1fr 80px;
            gap: 0;
            padding: 4px 8px;
            border-bottom: 1px solid var(--c-border);
            cursor: pointer;
            transition: background .08s;
            align-items: center;
        }

        .row:hover {
            background: var(--c-bg-hover);
        }

        .row.selected {
            background: var(--c-bg-selected);
        }

        .cell {
            font-size: 11px;
            color: var(--c-text);
            padding: 2px 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cell-sev {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sev-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .sev-dot-critical {
            background: var(--c-critical);
        }

        .sev-dot-warning {
            background: var(--c-warning);
        }

        .sev-dot-info {
            background: var(--c-info);
        }

        .cell-pattern {
            font-weight: 500;
            color: var(--c-text-bright);
        }

        .cell-value {
            font-family: var(--c-mono);
            color: var(--c-text-dim);
        }

        .cell-source {
            color: var(--c-text-dim);
            font-size: 10px;
        }

        .cell-url {
            color: var(--c-text-dim);
        }

        .cell-time {
            color: var(--c-text-dim);
            font-size: 10px;
            text-align: right;
        }

        /* ── Detail pane (right) ────────────────────────── */
        .detail-pane {
            width: 300px;
            flex-shrink: 0;
            overflow-y: auto;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .detail-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--c-text-dim);
            font-size: 12px;
            gap: 8px;
            padding: 24px;
            text-align: center;
        }

        .detail-header {
            padding: 10px 12px 8px;
            border-bottom: 1px solid var(--c-border);
        }

        .detail-pattern-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--c-text-bright);
            margin-bottom: 4px;
        }

        .sev-badge {
            display: inline-block;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: .06em;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .sev-badge-critical {
            background: rgba(201, 48, 44, .2);
            color: var(--c-critical);
        }

        .sev-badge-warning {
            background: rgba(232, 169, 76, .2);
            color: var(--c-warning);
        }

        .sev-badge-info {
            background: rgba(91, 155, 213, .2);
            color: var(--c-info);
        }

        .detail-body {
            padding: 10px 12px;
            flex: 1;
        }

        .detail-field {
            margin-bottom: 10px;
        }

        .detail-field-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--c-text-dim);
            margin-bottom: 3px;
        }

        .detail-field-value {
            font-size: 12px;
            color: var(--c-text);
            line-height: 1.5;
            word-break: break-all;
        }

        .detail-field-value.mono {
            font-family: var(--c-mono);
            font-size: 11px;
            background: var(--c-bg-row);
            padding: 4px 6px;
            border-radius: 3px;
            border: 1px solid var(--c-border);
        }

        .entropy-bar-wrap {
            height: 4px;
            background: var(--c-border);
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }

        .entropy-bar {
            height: 4px;
            border-radius: 2px;
            background: var(--c-brand);
            transition: width .3s;
        }

        .detail-actions {
            padding: 8px 12px;
            border-top: 1px solid var(--c-border);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .detail-actions-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--c-text-dim);
            margin-bottom: 2px;
        }

        .btn-suppress-full {
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid var(--c-border);
            background: transparent;
            color: var(--c-text);
            cursor: pointer;
            text-align: left;
            transition: background .1s;
            width: 100%;
        }

        .btn-suppress-full:hover {
            background: var(--c-bg-hover);
        }

        /* ── Status bar ─────────────────────────────────── */
        .status-bar {
            padding: 3px 10px;
            font-size: 10px;
            color: var(--c-text-dim);
            border-top: 1px solid var(--c-border);
            flex-shrink: 0;
            display: flex;
            gap: 12px;
        }

        /* ── Empty / no results states ──────────────────── */
        .no-results {
            padding: 32px;
            text-align: center;
            color: var(--c-text-dim);
            font-size: 12px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--c-border);
            border-radius: 2px;
        }
    </style>
</head>

<body>

    <!-- Toolbar -->
    <div class="toolbar">
        <span class="toolbar-title">Sentinel</span>
        <span class="count-pill" id="total-count">0</span>

        <div class="filter-group">
            <button class="chip active-all" id="filter-all" data-filter="all">All</button>
            <button class="chip" id="filter-critical" data-filter="critical">Critical</button>
            <button class="chip" id="filter-warning" data-filter="warning">Warning</button>
            <button class="chip" id="filter-info" data-filter="info">Info</button>
        </div>

        <button class="btn" id="btn-clear">Clear</button>
        <button class="btn" id="btn-export">Export JSON</button>
        <button class="btn btn-primary" id="btn-refresh">↺ Refresh</button>

        <div class="search-wrap">
            <input class="search-input" id="search-input" type="search" placeholder="Filter findings…" />
        </div>
    </div>

    <!-- Split layout -->
    <div class="split">

        <!-- Left: findings table -->
        <div class="table-pane" id="table-pane">
            <div class="table-header">
                <div class="th"></div>
                <div class="th" data-sort="patternName">Pattern</div>
                <div class="th" data-sort="redactedValue">Value</div>
                <div class="th" data-sort="sourceType">Source</div>
                <div class="th" data-sort="url">URL</div>
                <div class="th" data-sort="timestamp">Time</div>
            </div>
            <div class="table-body" id="table-body">
                <div class="no-results" id="empty-state">
                    No findings yet — browse a page while Sentinel is active.
                </div>
            </div>
        </div>

        <!-- Right: detail pane -->
        <div class="detail-pane" id="detail-pane">
            <div class="detail-empty" id="detail-empty">
                <div style="font-size:22px">🔍</div>
                <div>Select a finding to inspect it</div>
            </div>
            <div id="detail-content" style="display:none;flex:1;display:none;flex-direction:column">
                <div class="detail-header">
                    <div class="detail-pattern-name" id="d-pattern-name">—</div>
                    <span class="sev-badge" id="d-severity">—</span>
                </div>
                <div class="detail-body">
                    <div class="detail-field">
                        <div class="detail-field-label">Detected value</div>
                        <div class="detail-field-value mono" id="d-value">—</div>
                    </div>
                    <div class="detail-field">
                        <div class="detail-field-label">Source type</div>
                        <div class="detail-field-value" id="d-source">—</div>
                    </div>
                    <div class="detail-field">
                        <div class="detail-field-label">URL</div>
                        <div class="detail-field-value" id="d-url" style="word-break:break-all">—</div>
                    </div>
                    <div class="detail-field">
                        <div class="detail-field-label">Entropy score <span id="d-entropy-num"
                                style="font-weight:400;text-transform:none;letter-spacing:0"></span></div>
                        <div class="entropy-bar-wrap">
                            <div class="entropy-bar" id="d-entropy-bar" style="width:0%"></div>
                        </div>
                    </div>
                    <div class="detail-field">
                        <div class="detail-field-label">Value hash (SHA-256)</div>
                        <div class="detail-field-value mono" id="d-hash" style="font-size:10px;word-break:break-all">—
                        </div>
                    </div>
                    <div class="detail-field">
                        <div class="detail-field-label">Detected at</div>
                        <div class="detail-field-value" id="d-time">—</div>
                    </div>
                </div>
                <div class="detail-actions">
                    <div class="detail-actions-label">Suppress</div>
                    <button class="btn-suppress-full" id="d-sup-value">This specific value</button>
                    <button class="btn-suppress-full" id="d-sup-domain">All findings on this domain</button>
                    <button class="btn-suppress-full" id="d-sup-pattern">All findings of this pattern type</button>
                </div>
            </div>
        </div>

    </div>

    <!-- Status bar -->
    <div class="status-bar">
        <span id="status-tab">Tab: —</span>
        <span id="status-filtered">Showing: 0</span>
        <span id="status-suppressed">Suppressions active: 0</span>
    </div>

    <script src="dist/panel.js"></script>
</body>

</html>
